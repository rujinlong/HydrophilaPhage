project:
  type: default
  output-dir: .

execute:
  # Freeze: Record computational results and re-use them when source files haven't changed.
  # This significantly speeds up project iteration.
  freeze: false
  warning: false
  message: false

toc: true
toc-float: true
toc-depth: 4
number-sections: true
code-line-numbers: true
code-fold: true
code-tools: true
df-print: paged
reference-location: section
citation-location: document
cache: true

author:
  - name: Jinlong Ru
    orcid: 0000-0002-6757-6018

format:
  gfm: default
